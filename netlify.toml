
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  # ÖNEMLİ: Yapay zeka özelliklerinin çalışması için Netlify UI'da 
  # GEMINI_API_KEY ortam değişkenini ayarlamanız gerekir.
  # Bu değer, .env.local dosyanızda bulunur.

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/__generated/assetlinks.json"
  status = 200

[[headers]]
  for = "/__generated/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
